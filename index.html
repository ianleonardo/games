<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Arcade Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Press+Start+2P&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style/menu.css">
</head>

<body>
    <div class="hero-container">
        <h1 class="logo glow">ARCADE</h1>
        <p class="subtitle">Select a classic game to play</p>

        <div class="game-grid">
            <a href="src/tetris/tetris.html" class="game-card tetris-card">
                <div class="game-card-content">
                    <h2 class="game-title">Tetris</h2>
                    <p class="game-desc">Block puzzle classic.</p>
                </div>
            </a>
            <a href="src/pacman/pacman.html" class="game-card pacman-card">
                <div class="game-card-content">
                    <h2 class="game-title">Pac-Man</h2>
                    <p class="game-desc">Waka waka waka!</p>
                </div>
            </a>
            <a href="src/space-invaders/space-invaders.html" class="game-card space-invaders-card">
                <div class="game-card-content">
                    <h2 class="game-title">Space Invaders</h2>
                    <p class="game-desc">Defend the Earth!</p>
                </div>
            </a>
            <a href="src/donkey-kong/donkey-kong.html" class="game-card donkey-kong-card">
                <div class="game-card-content">
                    <h2 class="game-title">Donkey Kong</h2>
                    <p class="game-desc">How high can you get?</p>
                </div>
            </a>
        </div>
    </div>
</body>

</html>
